<textarea id=v placeholder=Vaga></textarea><textarea id=c placeholder=Curriculo></textarea><button onclick="go()">Analisar</button><pre id=o></pre><script>async function go(){o.textContent='Analisando...';let r=await fetch('/api/analisar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vaga:v.value,curriculo:c.value})});o.textContent=(await r.json()).report||'Erro'}</script>
